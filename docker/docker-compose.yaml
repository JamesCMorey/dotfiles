services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: dev
        UID: ${UID}
        GID: ${GID}
    container_name: devbox
    # match runtime user
    user: "${UID}:${GID}"
    stdin_open: true
    tty: true
  #  working_dir: /workspace
    volumes:
      # Config
      - ~/.ssh:/home/dev/.ssh
      - ~/.claude:/home/dev/.claude
      - ~/.claude.json:/home/dev/.claude.json
      - ~/.codex:/home/dev/.codex

      # Workspace
      - ~/code:/home/dev/code

    environment:
      TERM: xterm-256color
